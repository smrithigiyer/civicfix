<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - CivicFix</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-page">
    <!-- Dark Mode Toggle -->
    <button class="dark-mode-toggle" id="darkModeToggle" title="Toggle Dark Mode">
        <i class="fas fa-moon"></i>
    </button>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <a href="index.html" class="auth-logo">
                    <i class="fas fa-city"></i>
                    <span>CivicFix</span>
                </a>
                <h1>Create Account</h1>
                <p>Join CivicFix to report civic issues in your area</p>
            </div>
            
            <div class="auth-body">
                <div id="alertContainer"></div>
                
                <form id="registerForm">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <div class="input-group">
                            <span class="input-icon"><i class="fas fa-user"></i></span>
                            <input type="text" id="name" name="name" placeholder="Enter your full name" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <div class="input-group">
                            <span class="input-prefix">+91</span>
                            <input type="tel" id="phone" name="phone" placeholder="10-digit mobile number" maxlength="10" required>
                        </div>
                        <span class="form-hint">We'll use this for login and updates</span>
                    </div>
                    
                    <div class="form-group">
                        <label for="email">Email (Optional)</label>
                        <div class="input-group">
                            <span class="input-icon"><i class="fas fa-envelope"></i></span>
                            <input type="email" id="email" name="email" placeholder="your@email.com">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="input-group password-group">
                            <span class="input-icon"><i class="fas fa-lock"></i></span>
                            <input type="password" id="password" name="password" placeholder="Create a password" required>
                            <button type="button" class="password-toggle" id="togglePassword">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <span class="form-hint">Minimum 6 characters</span>
                    </div>
                    
                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <div class="input-group">
                            <span class="input-icon"><i class="fas fa-lock"></i></span>
                            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm your password" required>
                        </div>
                    </div>
                    
                    <div class="form-group checkbox-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="terms" required>
                            <span class="checkmark"></span>
                            I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
                        </label>
                    </div>
                    
                    <button type="submit" class="btn btn-primary btn-block btn-large">
                        <i class="fas fa-user-plus"></i> Create Account
                    </button>
                </form>
            </div>
            
            <div class="auth-footer">
                <p>Already have an account? <a href="index.html">Login here</a></p>
                <p>Admin? <a href="admin-register.html">Register as admin</a></p>
            </div>
        </div>
    </div>
    
    <!-- Custom JS -->
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Password toggle
            const togglePassword = document.getElementById('togglePassword');
            const password = document.getElementById('password');
            
            if (togglePassword) {
                togglePassword.addEventListener('click', () => {
                    const type = password.type === 'password' ? 'text' : 'password';
                    password.type = type;
                    togglePassword.innerHTML = `<i class="fas fa-eye${type === 'password' ? '' : '-slash'}"></i>`;
                });
            }
            
            // Register form
            const registerForm = document.getElementById('registerForm');
            
            registerForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const name = document.getElementById('name').value.trim();
                const phone = document.getElementById('phone').value.trim();
                const email = document.getElementById('email').value.trim();
                const passwordValue = password.value;
                const confirmPassword = document.getElementById('confirmPassword').value;
                
                // Validation
                if (!name) {
                    showAlert('Please enter your full name.', 'error');
                    return;
                }
                
                if (!validatePhone(phone)) {
                    showAlert('Please enter a valid 10-digit phone number.', 'error');
                    return;
                }
                
                if (email && !validateEmail(email)) {
                    showAlert('Please enter a valid email address.', 'error');
                    return;
                }
                
                if (!validatePassword(passwordValue)) {
                    showAlert('Password must be at least 6 characters long.', 'error');
                    return;
                }
                
                if (passwordValue !== confirmPassword) {
                    showAlert('Passwords do not match.', 'error');
                    return;
                }
                
                const submitBtn = registerForm.querySelector('button[type="submit"]');
                showButtonLoading(submitBtn, 'Creating account...');
                
                const result = await auth.register(phone, passwordValue, name, email || null);
                
                hideButtonLoading(submitBtn);
                
                if (result.success) {
                    showAlert('Account created successfully! Please login.', 'success');
                    setTimeout(() => {
                        if (window.navigateWithTransition) {
                            window.navigateWithTransition('index.html');
                        } else {
                            window.location.href = 'index.html';
                        }
                    }, 2000);
                } else {
                    showAlert(result.message, 'error');
                }
            });
        });
    </script>
</body>
</html>
